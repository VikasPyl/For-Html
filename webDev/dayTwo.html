<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tv</title>
    <style>
        body{
            margin: 0;
        }
        .container{
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-image: radial-gradient(circle, #444, #000);
        }
        .semi-container-one{
            height: 20vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-one{
            height: 30px;
            width: 140px;
            border-radius: 7px;
            border: 4px solid black;
            box-shadow: 0px 0px 12px white;
            transition:0.5s ease-in-out;
        }
        .btn-one:hover{
            transform: scale(1.23);
        }
        .semi-container-two{
            height: 60vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .semi-container-three{
            height: 20vh;
            width: 100vw;
        }
        .display-one{
            display: none;
        }
        .tv-border{
            height: 40vh;
            width: 60vw;
            border-radius: 14px;
            background-color: black;
            box-shadow: 0px 0px 25px white;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.6s ease-out;
        }
        .tv-border:hover{
            transform: scale(1.03);
        }
        .display{
                height: calc(40vh - 14px);
                width: calc(60vw - 14px);
                background-color: white;
                border-radius: 14px;
        }
        .one{
            display: none;
            height: calc(40vh - 14px);
            width: calc(60vw - 14px);
            border-radius: 14px;
           background-image: radial-gradient(circle, rgb(0,255,255), rgb(0,0,40));
        }
        .two{
            display: none;
            height: calc(40vh - 14px);
            width: calc(60vw - 14px);
            border-radius: 14px;
        }
        .three{
            display:none ;
            height: calc(40vh - 14px);
            width: calc(60vw - 14px);
            border-radius: 14px;
        }
        .iframe-two,.iframe-three{
            height: 100%;
            width: 100%;
            border-radius: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="semi-container-one">
            <button class="btn-one" id="btn-1"><b>TV BUTTON</b></button>
        </div>
        <div class="semi-container-two">
            <div class="tv-border">
                <div class="display one" id="display-1">
                </div>
                <div class="display two" id="display-2">
                    <iframe class="iframe-two"
                        src="https://www.youtube.com/embed/oafxkMv4xnc"
                        frameborder="0"
                        allowfullscreen>
                    </iframe>
                </div>
                <div class="display three" id="display-3">
                    <iframe class="iframe-three"
                        src="https://www.youtube.com/embed/ThPinA3THas" 
                        frameborder="0"
                        allowfullscreen>
                    </iframe>              
                </div> 
            </div>
        </div>
        <div class="semi-container-three"></div>
    </div>
    <script> 
        let a=1;

        const displayOne =document.getElementById('display-1');
        const displayTwo =document.getElementById('display-2');
        const displayThree =document.getElementById('display-3');
        const btn =document.getElementById('btn-1');

        btn.addEventListener("click",()=>{
            if(a==1){
                displayOne.style.display="flex";
                displayTwo.style.display="none";
                displayThree.style.display="none";
                a++;
            }else if(a==2){
                displayOne.style.display="none";
                displayTwo.style.display="flex";
                displayThree.style.display="none";
                a++;
            }else if (a==3){
                displayOne.style.display="none";
                displayTwo.style.display="none";
                displayThree.style.display="flex";
                a++;
            }else if(a==4){
                displayOne.style.display="none";
                displayTwo.style.display="none";
                displayThree.style.display="none";
                a=1;
            }
            
        })
    </script>

    
</body>
</html>
